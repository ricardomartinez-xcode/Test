name: Refresh npm lockfile (temporary)

on:
  push:
    branches:
      - fix/npm-lockfile-cloudflare-build

permissions:
  contents: write

jobs:
  sync-lockfile:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/npm-lockfile-cloudflare-build
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Regenerate lock file from package.json
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund
      - name: Validate the same install contract as Cloudflare
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Commit synchronized lockile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git diff --cached --quiet || git commit -m "fix(deps): sync npm lockfile for Cloudflare"
          git push origin HEAD:fix/npm-lockfile-cloudflare-build
